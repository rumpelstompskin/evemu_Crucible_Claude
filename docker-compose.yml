services:
  server:
    image: "evemu_server"
    build: . #Build image from source repository
    container_name: server
    volumes:
      - ./config:/app/etc
      - server_cache:/app/server_cache
      - image_cache:/app/image_cache
    ports:
      - "26000:26000"
      - "26001:26001"
    depends_on:
      - db
    links:
      - "db"
    environment:
      - SEED_MARKET=${SEED_MARKET:-TRUE} # Set to TRUE to seed the market when the server starts for the first time
      - SEED_SATURATION=${SEED_SATURATION:-100} # Set saturation level of seed
      - SEED_REGIONS=${SEED_REGIONS:-The Forge,The Citadel,Lonetrek,Black Rise,Domain,Devoid,The Bleak Lands,Aridia,Genesis,Kador,Khanid,Kor-Azor,Tash-Murkon,Derelik,Essence,Everyshore,Placid,Verge Vendor,Sinq Laison,Solitude,Heimatar,Metropolis,Molden Heath,Curse,Stain,Venal,Great Wildlands,Syndicate,Outer Ring} # All regions with NPC stations (empire + NPC null-sec)
      - RUN_WITH_GDB=${RUN_GDB:-FALSE} #Set to TRUE to run evemu with gdb automatically
    stdin_open: true # Enables stdin for the container. Attach to it with 'docker attach'
    tty: true
    # cap_add: #This is required for gdb to work
    #   - SYS_PTRACE

  db:
    image: "mariadb:11.8"
    container_name: db
    volumes:
      - db:/var/lib/mysql
    # If you want to connect to the Database pick your host port to map it to, (host-port:container-port) below. 
    #ports:
    #  - "3306:3306"  
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=true
      - MARIADB_USER=evemu
      - MARIADB_PASSWORD=evemu
      - MARIADB_DATABASE=evemu

volumes:
  db:
  server_cache:
  image_cache:

